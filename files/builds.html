<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builds — Elysian PCs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .builds-hero {
      padding: 140px 0 80px;
      text-align: center;
      position: relative;
    }
    .builds-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, var(--gold-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Filters */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3rem;
    }
    .filter-chip {
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-chip:hover,
    .filter-chip.active {
      border-color: var(--border-gold);
      color: var(--gold-pure);
      background: var(--gold-glow);
    }

    /* Builds grid */
    #builds-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.75rem;
    }

    /* PC detail modal extra */
    .spec-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    .spec-table tr { border-bottom: 1px solid var(--border-subtle); }
    .spec-table tr:last-child { border-bottom: none; }
    .spec-table td { padding: 0.6rem 0.5rem; font-size: 0.85rem; }
    .spec-table td:first-child { color: var(--text-muted); width: 40%; font-family: var(--font-display); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .spec-table td:last-child { color: var(--text-primary); }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: skeleton 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes skeleton {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-img { height: 240px; border-radius: var(--radius-md) var(--radius-md) 0 0; }
    .skel-text { height: 1rem; margin: 0.5rem 0; }
    .skel-text.sm { width: 60%; }
    .skel-text.lg { width: 80%; }
    .skel-btn { height: 44px; border-radius: var(--radius-sm); margin-top: 1rem; }

    @media (max-width: 1024px) { #builds-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { #builds-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div id="nav-slot"></div>

<div class="page-wrapper">

  <!-- Hero -->
  <div class="builds-hero">
    <div class="container">
      <span class="section-eyebrow animate__animated animate__fadeInDown">Elysian Collection</span>
      <h1 class="section-title animate__animated animate__fadeIn" style="font-size:clamp(2.5rem,6vw,5rem);margin:0.5rem 0 1rem;">
        Signature <span class="text-gold">Builds</span>
      </h1>
      <p class="section-subtitle animate__animated animate__fadeIn animate__delay-1s">
        Every machine is a handcrafted statement of intent. Choose yours.
      </p>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="container">
    <div class="filter-bar reveal">
      <button class="filter-chip active" data-filter="all">All Builds</button>
      <button class="filter-chip" data-filter="workstation">Workstation</button>
      <button class="filter-chip" data-filter="gaming">Gaming</button>
      <button class="filter-chip" data-filter="creator">Creator</button>
      <button class="filter-chip" data-filter="entry">Entry Luxury</button>
    </div>

    <!-- Builds Grid -->
    <div id="builds-grid">
      <!-- Populated by JS from KV or defaults -->
    </div>

    <div class="text-center mt-4 reveal" id="builds-footer-cta">
      <p class="text-secondary mb-2">Don't see exactly what you need?</p>
      <a href="support.html" class="btn btn-outline btn-lg">Request a Custom Build</a>
    </div>
  </div>

  <!-- Modal for PC Detail -->
  <div class="modal-overlay" id="pc-modal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <span class="modal-title" id="modal-pc-name">PC Details</span>
        <button class="cart-close" onclick="document.getElementById('pc-modal').classList.remove('open')" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="modal-pc-content"></div>
    </div>
  </div>

</div><!-- /page-wrapper -->

<div id="footer-slot"></div>

<script src="partials.js"></script>
<script src="main.js"></script>
<script>

// ── Build Card Renderer ──────────────────────────────────────
function createPCCard(pc) {
  const card = document.createElement('div');
  card.className = 'card pc-card reveal';
  card.dataset.category = pc.category;

  const gradients = {
    'sovereign-x': 'linear-gradient(135deg,#1a1a24,#0d0d14)',
    'apex-pro': 'linear-gradient(135deg,#141420,#0a0a10)',
    'origin': 'linear-gradient(135deg,#12121c,#0c0c16)',
    'aurora-creator': 'linear-gradient(135deg,#1c1818,#0f0a0a)',
    'spectre-gaming': 'linear-gradient(135deg,#141824,#090d14)',
    'phantom-mini': 'linear-gradient(135deg,#181420,#0c0a10)',
  };

  const specsPreview = Object.entries(pc.specs).slice(0, 4);

  card.innerHTML = `
    <div style="width:100%;height:240px;background:${gradients[pc.id]||'linear-gradient(135deg,#1a1a24,#0d0d14)'};display:flex;align-items:center;justify-content:center;overflow:hidden;">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="rgba(212,168,67,0.15)" stroke-width="0.8">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </div>
    ${pc.badge ? `<div class="pc-card-badge">${pc.badge}</div>` : ''}
    <div class="card-body">
      <div class="pc-card-title">${pc.name}</div>
      <div class="pc-card-price">$${pc.price.toLocaleString()}</div>
      <ul class="pc-card-specs">
        ${specsPreview.map(([k,v]) => `<li>${v}</li>`).join('')}
      </ul>
      <div style="display:flex;gap:0.6rem;">
        <button class="btn btn-outline btn-sm" onclick="openPCModal('${pc.id}')">Details</button>
        <button class="btn btn-primary" style="flex:1" onclick="Cart.add({id:'${pc.id}',name:'${pc.name}',price:${pc.price}})">
          Add to Cart
        </button>
      </div>
    </div>`;

  return card;
}

function openPCModal(id) {
  const pc = currentPCs.find(p => p.id === id);
  if (!pc) return;
  document.getElementById('modal-pc-name').textContent = pc.name;
  document.getElementById('modal-pc-content').innerHTML = `
    <div style="margin-bottom:1rem;">
      <span class="pc-card-price" style="font-size:1.8rem;">$${pc.price.toLocaleString()}</span>
    </div>
    <table class="spec-table">
      ${Object.entries(pc.specs).map(([k,v]) => `
        <tr><td>${k}</td><td>${v}</td></tr>
      `).join('')}
    </table>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
      <button class="btn btn-primary btn-full btn-lg" onclick="Cart.add({id:'${pc.id}',name:'${pc.name}',price:${pc.price}});document.getElementById('pc-modal').classList.remove('open')">
        Add to Cart
      </button>
    </div>`;
  document.getElementById('pc-modal').classList.add('open');
}

// Close modal on overlay click
document.getElementById('pc-modal')?.addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

let currentPCs = [];

function renderBuilds(pcs, filter = 'all') {
  const grid = document.getElementById('builds-grid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? pcs : pcs.filter(p => p.category === filter);
  filtered.forEach(pc => {
    const card = createPCCard(pc);
    grid.appendChild(card);
  });
  // Re-run scroll reveal on new elements
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }});
  }, { threshold: 0.1 });
  grid.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

function renderSkeletons() {
  const grid = document.getElementById('builds-grid');
  grid.innerHTML = Array(6).fill(0).map(() => `
    <div class="card" style="overflow:hidden;">
      <div class="skeleton skel-img"></div>
      <div class="card-body">
        <div class="skeleton skel-text lg"></div>
        <div class="skeleton skel-text sm" style="height:1.5rem;margin:0.5rem 0 1rem;"></div>
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-text sm"></div>
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-text sm"></div>
        <div class="skeleton skel-btn"></div>
      </div>
    </div>`).join('');
}

// Filter chips
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderBuilds(currentPCs, chip.dataset.filter);
  });
});

// Load data
async function loadBuilds() {
  renderSkeletons();
  const data = await fetchPCData();
  currentPCs = (data && data.pcs && data.pcs.length) ? data.pcs : DEFAULT_PCS;
  renderBuilds(currentPCs);
}

document.addEventListener('DOMContentLoaded', loadBuilds);
</script>
</body>
</html>
