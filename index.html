<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elysian PCs — Custom Built Computers</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
  :root {
    --gold: #F0B84A;
    --bg: #0a0a0f;
    --bg2: #12121a;
    --white: #ffffff;
    --border: rgba(240,184,74,0.25);
  }

  body { 
    background: var(--bg); 
    color: var(--white); 
    font-family: 'Nunito', sans-serif; 
    margin: 0; 
    overflow-x: hidden;
  }

  /* ─── ORIGINAL NAV UI ─── */
  .nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 5%; background: rgba(10,10,15,0.9);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
  }
  .nav-logo-img { height: 60px; width: auto; }

  /* ─── HERO SECTION ─── */
  .hero {
    text-align: center; padding: 100px 20px;
    background: radial-gradient(circle at center, rgba(240,184,74,0.05) 0%, transparent 70%);
  }
  .hero h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: var(--gold); margin: 0; text-shadow: 0 0 20px rgba(240,184,74,0.3); }

  /* ─── PC GRID ─── */
  .pc-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px; padding: 50px 5%;
  }
  .pc-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 15px; padding: 20px; transition: 0.3s;
  }
  .pc-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 0 30px rgba(240,184,74,0.1); }
  .pc-price { color: var(--gold); font-size: 1.5rem; font-weight: bold; }

  /* ─── SUPPORT SYSTEM UI ─── */
  .support-container { max-width: 600px; margin: 100px auto; padding: 40px; background: var(--bg2); border: 1px solid var(--gold); border-radius: 20px; }
  input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a28; border: 1px solid #333; color: white; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
  .cta-btn { background: var(--gold); color: black; border: none; padding: 15px 30px; cursor: pointer; font-weight: 900; width: 100%; border-radius: 8px; text-transform: uppercase; }

  /* ─── SOCIAL MEDIA ─── */
  .social-links { display: flex; gap: 30px; justify-content: center; padding: 50px; }
  .social-icon { font-size: 2.5rem; transition: 0.3s; }
  .fa-twitter { color: #1DA1F2; } .fa-instagram { color: #E1306C; } .fa-discord { color: #5865F2; }
</style>
</head>
<body>

<nav class="nav">
    <img src="image_08d4a3.jpg" alt="Elysian" class="nav-logo-img">
    <div>
        <a href="#builds" style="color:white; text-decoration:none; margin-right:20px;">Builds</a>
        <a href="#support" style="color:var(--gold); text-decoration:none;">Support</a>
    </div>
</nav>

<section class="hero">
    <h1>ELYSIAN PCs</h1>
    <p style="letter-spacing: 5px; color: #888;">THE GOLD STANDARD OF GAMING</p>
</section>

<div id="builds" class="pc-grid">
    </div>

<section id="support" class="support-container">
    <h2 style="font-family: 'Cinzel'; text-align: center; color: var(--gold);">Support Ticket</h2>
    <form id="ticket-form">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <textarea id="msg" rows="5" placeholder="Describe your issue or custom build request..." required></textarea>
        <button type="submit" class="cta-btn">Send Ticket</button>
    </form>
</section>

<div class="social-links">
    <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
    <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
    <a href="#" class="social-icon"><i class="fab fa-discord"></i></a>
</div>

<script>
    // 1. DATA (Your old UI PCs)
    let pcs = [
        { name: "The Oracle", price: 1299, specs: "RTX 4060 Ti | i5-13400F | 32GB RAM" },
        { name: "The Titan", price: 2499, specs: "RTX 4080 Super | i7-14700K | 64GB RAM" },
        { name: "The Sovereign", price: 4299, specs: "RTX 4090 | i9-14900K | 128GB RAM" }
    ];

    // 2. RENDER FUNCTION (The old UI builder)
    function renderPCs() {
        const grid = document.getElementById('builds');
        grid.innerHTML = pcs.map(pc => `
            <div class="pc-card">
                <h3 style="font-family: 'Cinzel'; margin-top:0;">${pc.name}</h3>
                <p style="color:#888;">${pc.specs}</p>
                <div class="pc-price">$${pc.price}</div>
                <button onclick="buyNow('${pc.name}', ${pc.price})" class="cta-btn" style="margin-top:15px; padding:10px;">Buy Now</button>
            </div>
        `).join('');
    }

    // 3. STRIPE BUY NOW
    async function buyNow(name, price) {
        const stripe = Stripe('pk_test_51T7SnfLAAINeFFlcIKP0QSIMwWTg5t4fL3ejZfi7huzcdohMdnxpDmIujc7T0kOuC11enUWIblN7DPcVU9CvirOW008lA920Ps');
        const res = await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart: [{ name: name, price: price }] })
        });
        const session = await res.json();
        stripe.redirectToCheckout({ sessionId: session.id });
    }

    // 4. EMAIL TICKETS
    emailjs.init("9CNRBFJzrjkM4BrNT");
    document.getElementById('ticket-form').addEventListener('submit', function(e) {
        e.preventDefault();
        emailjs.send("default_service", "YOUR_TEMPLATE_ID", {
            from_name: document.getElementById('name').value,
            user_email: document.getElementById('email').value,
            message: document.getElementById('msg').value,
            to_email: "d4yohero@gmail.com"
        }).then(() => {
            alert("Ticket Sent!");
            this.reset();
        });
    });

    // 5. GLOBAL SYNC (Cloudflare KV)
    async function sync() {
        try {
            const res = await fetch('/api/pcs');
            const data = await res.json();
            if (data.length > 0) pcs = data;
        } catch (e) { console.log("KV Database not active yet."); }
        renderPCs();
    }

    window.onload = sync;
</script>

</body>
</html>
